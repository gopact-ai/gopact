name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Check formatting whitespace
        run: git diff --check

      - name: Test
        run: go test -count=1 ./...

      - name: Vet
        run: go vet ./...
