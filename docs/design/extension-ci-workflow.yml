name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure private SDK access
        env:
          GOPACT_GITHUB_TOKEN: ${{ secrets.GOPACT_GITHUB_TOKEN || github.token }}
        run: |
          if [ -z "${GOPACT_GITHUB_TOKEN}" ]; then
            echo "GOPACT_GITHUB_TOKEN or github.token is required while github.com/gopact-ai/gopact is private." >&2
            exit 1
          fi
          git config --global url."https://x-access-token:${GOPACT_GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true

      - name: Configure private Go modules
        run: |
          go env -w GOPRIVATE='github.com/gopact-ai/*'
          go env -w GONOSUMDB='github.com/gopact-ai/*'
          go env -w GONOPROXY='github.com/gopact-ai/*'

      - name: Check formatting whitespace
        run: git diff --check

      - name: Check module tidiness
        run: go mod tidy && git diff --exit-code

      - name: Test
        run: go test -count=1 ./...

      - name: Vet
        run: go vet ./...
