name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: reject private development documents
        shell: bash
        run: |
          # Keep this authoritative-doc allowlist in sync with .gitignore.
          allowed=$(cat <<'EOF'
          doc/decisions/0001-run-closure.md
          doc/decisions/0002-durable-store-authority.md
          doc/decisions/0003-history-policy.md
          doc/design/system-constitution_zh.md
          doc/rfcs/run-store-history-alignment.md
          doc/superpowers/specs/2026-07-11-agent-control-surface-design.md
          doc/superpowers/specs/2026-07-12-agent-state-identity-design.md
          EOF
          )
          tracked=$(git ls-files 'doc/**' 'docs/**' | sort)
          unexpected=$(comm -23 <(printf '%s\n' "$tracked") <(printf '%s\n' "$allowed" | sort))
          missing=$(comm -13 <(printf '%s\n' "$tracked") <(printf '%s\n' "$allowed" | sort))
          ignored=$(printf '%s\n' "$allowed" | git check-ignore --no-index --stdin || true)
          test -z "$unexpected" || {
            printf 'unexpected development documents are tracked:\n%s\n' "$unexpected"
            exit 1
          }
          test -z "$missing" || {
            printf 'authoritative documents are not tracked:\n%s\n' "$missing"
            exit 1
          }
          test -z "$ignored" || {
            printf 'authoritative documents are still ignored:\n%s\n' "$ignored"
            exit 1
          }
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.27.0-rc.2'
      - run: test -z "$(gofmt -l .)"
      - run: go mod tidy -diff
      - name: Test API contracts and fault matrix
        run: go test -count=1 ./...
      - name: Race-test API contracts and fault matrix
        run: go test -race -count=1 ./...
      - run: go vet ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
      - run: govulncheck ./...
